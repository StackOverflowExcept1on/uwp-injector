name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build project
        run: _build.bat
        shell: cmd

      - uses: actions/upload-artifact@v6
        with:
          name: uwp-injector
          path: |
            build/injector.exe
            build/library.dll
